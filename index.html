<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheCard</title>
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .scene {
      perspective: 1400px;
      perspective-origin: 50% 50%;
      cursor: grab;
      touch-action: none; /* otherwise a drag gets swallowed as a scroll/zoom */
    }

    .scene.dragging {
      cursor: grabbing;
    }

    .card {
      --w: 300px;
      --h: 420px;
      --d: 16px;
      --r: 18px;

      position: relative;
      width: var(--w);
      height: var(--h);

      transform-style: preserve-3d;
      transform: rotateX(-12deg) rotateY(18deg);

      will-change: transform;
    }

    .face {
      position: absolute;
      top: 50%;
      left: 50%;
      backface-visibility: hidden; /* don't let a face show through from behind */
      border-radius: var(--r);
      overflow: hidden;
    }

    .face--front,
    .face--back {
      width: var(--w);
      height: var(--h);
      margin-left: calc(var(--w)/-2);
      margin-top: calc(var(--h)/-2);
    }

    .face--front {
      transform: translateZ(calc(var(--d)/2));
      background: #15172b; /* fallback while the image loads, or if it fails */
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .face--back {
      transform: rotateY(180deg) translateZ(calc(var(--d)/2));
      background: #0a0b16;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none; /* let the drag fall through to the scene */
      user-select: none;
    }

    /* specular glare; --gx/--gy/--gi are driven per-face from JS so the
       highlight tracks a light fixed to the screen, not to the card */
    .face--front::after,
    .face--back::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      mix-blend-mode: screen; /* adds light instead of painting over the image */
      /* stops trace an inverse-square area-light falloff (1/(1+(t/h)^2),
         normalized to fade to zero) so there's no hard cutoff ring and the
         core stays soft instead of reading as a hard spotlight */
      background: radial-gradient(82% 76% at var(--gx, 70%) var(--gy, 28%),
                  rgba(255, 255, 255, calc(var(--gi, 0) * 1.000)) 0%,
                  rgba(255, 255, 255, calc(var(--gi, 0) * 0.911)) 12%,
                  rgba(255, 255, 255, calc(var(--gi, 0) * 0.710)) 24%,
                  rgba(255, 255, 255, calc(var(--gi, 0) * 0.502)) 36%,
                  rgba(255, 255, 255, calc(var(--gi, 0) * 0.334)) 48%,
                  rgba(255, 255, 255, calc(var(--gi, 0) * 0.210)) 60%,
                  rgba(255, 255, 255, calc(var(--gi, 0) * 0.122)) 72%,
                  rgba(255, 255, 255, calc(var(--gi, 0) * 0.059)) 84%,
                  rgba(255, 255, 255, calc(var(--gi, 0) * 0.026)) 92%,
                  rgba(255, 255, 255, 0) 100%);
    }

    /* edges are pulled in by --r so they stop short of the rounded corners
       instead of poking square tabs past them */
    .face--left,
    .face--right {
      width: var(--d);
      height: calc(var(--h) - var(--r)*2);
      margin-left: calc(var(--d)/-2);
      margin-top: calc((var(--h) - var(--r)*2)/-2);
      background: linear-gradient(90deg, #1b1d33, #060710);
      border-radius: 0;
    }

    .face--right {
      transform: rotateY(90deg) translateZ(calc(var(--w)/2));
    }

    .face--left {
      transform: rotateY(-90deg) translateZ(calc(var(--w)/2));
    }

    .face--top,
    .face--bottom {
      width: calc(var(--w) - var(--r)*2);
      height: var(--d);
      margin-left: calc((var(--w) - var(--r)*2)/-2);
      margin-top: calc(var(--d)/-2);
      background: linear-gradient(180deg, #2a2d4d, #060710);
      border-radius: 0;
    }

    .face--top {
      transform: rotateX(90deg) translateZ(calc(var(--h)/2));
    }

    .face--bottom {
      transform: rotateX(-90deg) translateZ(calc(var(--h)/2));
    }

  </style>
</head>
<body>
  <main>
    <div class="scene" id="scene">
      <div class="card" id="card">
        <!-- swap the two src values for a real file (e.g. img/front.png) or URL -->
        <div class="face face--front">
          <img class="card-img" alt="card front"
               src='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="840"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="%232b2f55"/><stop offset="1" stop-color="%230a0b16"/></linearGradient></defs><rect width="600" height="840" fill="url(%23g)"/><text x="300" y="440" fill="%23ffffff" fill-opacity="0.55" font-family="sans-serif" font-size="46" text-anchor="middle">IMAGE</text></svg>' />
        </div>
        <div class="face face--back">
          <img class="card-img" alt="card back"
               src='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="840"><rect width="600" height="840" fill="%230a0b16"/><text x="300" y="440" fill="%23ffffff" fill-opacity="0.3" font-family="sans-serif" font-size="40" letter-spacing="6" text-anchor="middle">BACK</text></svg>' />
        </div>
        <div class="face face--right"></div>
        <div class="face face--left"></div>
        <div class="face face--top"></div>
        <div class="face face--bottom"></div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const scene = document.getElementById('scene');
      const card = document.getElementById('card');

      let rotX = -12;
      let rotY = 18;
      // angular velocity in deg/ms, sampled at release so the coast doesn't
      // care how fast the display refreshes
      let velX = 0;
      let velY = 0;

      let dragging = false;
      let lastX = 0;
      let lastY = 0;
      let lastMoveT = 0;
      let inertiaId = null;

      const SENS = 0.4;    // deg of rotation per pixel dragged
      const DECAY = 0.004; // coast falloff per ms; tuned to the old ~0.94/frame feel
      const STOP = 0.002;  // deg/ms below which the coast has effectively ended
      const MAX_DT = 64;   // clamp gaps so a backgrounded tab doesn't launch the card

      // --- lighting ------------------------------------------------------------
      // CSS transform space: x right, y down, z out of the screen toward us.
      // The light sits top-right and in front, so up is -y and front is +z.
      const dot = (a, b) => a[0]*b[0] + a[1]*b[1] + a[2]*b[2];
      const norm = (v) => { const m = Math.hypot(v[0], v[1], v[2]); return [v[0]/m, v[1]/m, v[2]/m]; };

      const L = norm([0.6, -0.7, 0.55]);            // card -> light direction
      const H = norm([L[0], L[1], L[2] + 1]);       // half vector with the view dir (0,0,1)
      const SHINE = 2.2;   // lower = broader, softer angular response (area light)
      const MAXA = 0.4;    // peak glare opacity
      const SPREAD = 42;   // how far (in %) the highlight slides across a face

      // each face carries its rest-pose normal/right/up in card-local space;
      // the back is rotateY(180), so its normal and right axis are flipped
      const front = card.querySelector('.face--front');
      const back = card.querySelector('.face--back');
      const litFaces = [
        { el: front, n: [0, 0, 1],  r: [1, 0, 0],  u: [0, 1, 0] },
        { el: back,  n: [0, 0, -1], r: [-1, 0, 0], u: [0, 1, 0] },
      ];

      // rotate v by the card's transform: rotateX(a) after rotateY(b)
      function spin(v, a, b) {
        const cb = Math.cos(b), sb = Math.sin(b);
        const x = v[0]*cb + v[2]*sb, z = -v[0]*sb + v[2]*cb, y = v[1];
        const ca = Math.cos(a), sa = Math.sin(a);
        return [x, y*ca - z*sa, y*sa + z*ca];
      }

      function updateGlare() {
        const a = rotX * Math.PI / 180, b = rotY * Math.PI / 180;
        for (const f of litFaces) {
          const n = spin(f.n, a, b);
          const facing = dot(n, H);
          const gi = facing > 0 ? Math.pow(facing, SHINE) * MAXA : 0;
          const gx = 50 + dot(H, spin(f.r, a, b)) * SPREAD;
          const gy = 50 + dot(H, spin(f.u, a, b)) * SPREAD;
          f.el.style.setProperty('--gx', gx.toFixed(1) + '%');
          f.el.style.setProperty('--gy', gy.toFixed(1) + '%');
          f.el.style.setProperty('--gi', gi.toFixed(3));
        }
      }

      function render() {
        card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        updateGlare();
      }

      function onPointerDown(e) {
        dragging = true;
        scene.classList.add('dragging');
        lastX = e.clientX;
        lastY = e.clientY;
        lastMoveT = performance.now();
        velX = 0;
        velY = 0;
        if (inertiaId) {
          cancelAnimationFrame(inertiaId);
          inertiaId = null;
        }
        scene.setPointerCapture(e.pointerId);
      }

      function onPointerMove(e) {
        if (!dragging) return;
        const now = performance.now();
        const dt = now - lastMoveT;
        const dRotY = (e.clientX - lastX) * SENS;
        const dRotX = -(e.clientY - lastY) * SENS;

        rotY += dRotY;
        rotX += dRotX;

        // record speed as deg per ms, the unit the coast loop integrates against
        if (dt > 0) {
          velY = dRotY / dt;
          velX = dRotX / dt;
        }

        lastX = e.clientX;
        lastY = e.clientY;
        lastMoveT = now;
        render();
      }

      function onPointerUp(e) {
        if (!dragging) return;
        dragging = false;
        scene.classList.remove('dragging');
        try { scene.releasePointerCapture(e.pointerId); } catch (_) {}

        // let go after holding still -> drop the stale speed, no fling
        if (performance.now() - lastMoveT > MAX_DT) {
          velX = 0;
          velY = 0;
        }
        startInertia();
      }

      function startInertia() {
        let prev = performance.now();
        function step(now) {
          const dt = Math.min(now - prev, MAX_DT);
          prev = now;

          // advance by the exact integral of velocity*decay over this step, so
          // the total travel is the same at 60Hz, 144Hz or anything else
          const k = Math.exp(-DECAY * dt);
          rotX += velX * (1 - k) / DECAY;
          rotY += velY * (1 - k) / DECAY;
          velX *= k;
          velY *= k;

          render();

          if (Math.abs(velX) < STOP && Math.abs(velY) < STOP) {
            inertiaId = null;
            return;
          }
          inertiaId = requestAnimationFrame(step);
        }
        inertiaId = requestAnimationFrame(step);
      }

      scene.addEventListener('pointerdown', onPointerDown);
      scene.addEventListener('pointermove', onPointerMove);
      scene.addEventListener('pointerup', onPointerUp);
      scene.addEventListener('pointercancel', onPointerUp);

      render();
    })();
  </script>
</body>
</html>
